- addnode:
  - miner
  config: 'maxconnections=1000

    uacomment=spender-aries

    signetchallenge=0014e3ea7fd153289c0e853121b06220061b9aae76a6

    coinstatsindex=1'
  global:
    chain: signet
    rpcpassword: fd180a84e8e84ae5d5bf96aae9ce3877
  image:
    tag: '29.0'
  ln:
    lnd: true
  lnd:
    adminMacaroon: 
    channels:
    - capacity: 200000000
      id:
        block: 500
        index: 1
      push_amt: 0
      target: router-aries-ln
    extraContainers:
    - env:
      - name: METRICS
        value: 'lnd_block_height=parse("/v1/getinfo","block_height") failed_payments=FAILED_PAYMENTS '
      image: bitcoindevproject/lnd-exporter:0.2.0
      imagePullPolicy: IfNotPresent
      name: lnd-exporter
      ports:
      - containerPort: 9332
        name: prom-metrics
        protocol: TCP
      volumeMounts:
      - mountPath: /macaroon.hex
        name: config
        subPath: MACAROON_HEX
    image:
      tag: v0.19.0-beta
    macaroonRootKey: APRdgXrBVifsFoFD9fy3QMSYikGDQJnqCC58Gs8/75o=
    metricsExport: true
    prometheusMetricsPort: 9332
  name: spender-aries
