caddy:
  enabled: true
nodes:
- addnode:
  - miner
  config: 'maxconnections=1000

    uacomment=spender-aries

    signetchallenge=001469beb24498553e96507dfbbaa1f149bd74386404

    coinstatsindex=1'
  global:
    chain: signet
    rpcpassword: 0a71c86577d8ba9b9518d397e6ee58a4
  image:
    tag: '29.0'
  ln:
    lnd: true
  lnd:
    adminMacaroon: 
    channels:
    - capacity: 200000000
      id:
        block: 500
        index: 1
      push_amt: 0
      target: router-aries-ln
    extraContainers:
    - env:
      - name: METRICS
        value: 'lnd_block_height=parse("/v1/getinfo","block_height") failed_payments=FAILED_PAYMENTS '
      image: bitcoindevproject/lnd-exporter:0.2.0
      imagePullPolicy: IfNotPresent
      name: lnd-exporter
      ports:
      - containerPort: 9332
        name: prom-metrics
        protocol: TCP
      volumeMounts:
      - mountPath: /macaroon.hex
        name: config
        subPath: MACAROON_HEX
    image:
      tag: v0.19.0-beta
    macaroonRootKey: CdFNlFeoZNk5fzcVxCQZNunQlGdEvRz4iZ7b3GSOpOw=
    metricsExport: true
    prometheusMetricsPort: 9332
  name: spender-aries
