caddy:
  enabled: true
nodes:
- addnode:
  - miner
  config: 'maxconnections=1000

    uacomment=spender-aries

    signetchallenge=00141ba093f9b1f7f2850945a43c714e97109cfa1f62

    coinstatsindex=1'
  global:
    chain: signet
    rpcpassword: bddbe36ece6ac69fb960354ad55fa154
  image:
    tag: '29.0'
  ln:
    lnd: true
  lnd:
    adminMacaroon: 
    channels:
    - capacity: 200000000
      id:
        block: 500
        index: 1
      push_amt: 0
      target: router-aries-ln
    extraContainers:
    - env:
      - name: METRICS
        value: 'lnd_block_height=parse("/v1/getinfo","block_height") failed_payments=FAILED_PAYMENTS '
      image: bitcoindevproject/lnd-exporter-htlcs:0.2.0
      imagePullPolicy: IfNotPresent
      name: lnd-exporter
      ports:
      - containerPort: 9332
        name: prom-metrics
        protocol: TCP
      volumeMounts:
      - mountPath: /macaroon.hex
        name: config
        subPath: MACAROON_HEX
    image:
      tag: v0.19.0-beta
    macaroonRootKey: SIA0DsfUV3IubFKezYB38U6fzVAjF9lSlhfv2k4Zx08=
    metricsExport: true
    prometheusMetricsPort: 9332
  name: spender-aries
