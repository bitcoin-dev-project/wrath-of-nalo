caddy:
  enabled: true
nodes:
- addnode:
  - miner
  config: 'maxconnections=1000

    uacomment=spender-aries

    coinstatsindex=1'
  global:
    chain: regtest
    rpcpassword: fcd16973c9e2875c2c02e4f7c5ba4b28
  image:
    tag: '29.0'
  ln:
    lnd: true
  lnd:
    adminMacaroon: 
    channels:
    - capacity: 200000000
      id:
        block: 500
        index: 1
      push_amt: 0
      target: router-aries-ln
    extraContainers:
    - env:
      - name: METRICS
        value: 'lnd_block_height=parse("/v1/getinfo","block_height") failed_payments=FAILED_PAYMENTS '
      image: bitcoindevproject/lnd-exporter:0.2.0
      imagePullPolicy: IfNotPresent
      name: lnd-exporter
      ports:
      - containerPort: 9332
        name: prom-metrics
        protocol: TCP
      volumeMounts:
      - mountPath: /macaroon.hex
        name: config
        subPath: MACAROON_HEX
    image:
      tag: v0.19.0-beta
    macaroonRootKey: vYb/jm7Yuhu8zYBVsBzuwKUTtNPtFIhxM6ZDdTHvLtw=
    metricsExport: true
    prometheusMetricsPort: 9332
  name: spender-aries
- addnode:
  - miner
  config: 'maxconnections=1000

    uacomment=router-aries

    coinstatsindex=1'
  global:
    chain: regtest
    rpcpassword: c1cb1cd7921971faeb334ed29e21aa6d
  image:
    tag: '29.0'
  ln:
    lnd: true
  lnd:
    adminMacaroon: 
    channels:
    - capacity: 200000000
      id:
        block: 500
        index: 2
      push_amt: 0
      target: recipient-aries-ln
    extraContainers:
    - env:
      - name: METRICS
        value: 'lnd_block_height=parse("/v1/getinfo","block_height") pending_htlcs=PENDING_HTLCS '
      image: bitcoindevproject/lnd-exporter:0.2.0
      imagePullPolicy: IfNotPresent
      name: lnd-exporter
      ports:
      - containerPort: 9332
        name: prom-metrics
        protocol: TCP
      volumeMounts:
      - mountPath: /macaroon.hex
        name: config
        subPath: MACAROON_HEX
    image:
      tag: v0.19.0-beta
    macaroonRootKey: 8P5GF6TZwcFen9X5cZ/gr3gIASkQnmznsadytUCLM2E=
    metricsExport: true
    prometheusMetricsPort: 9332
  name: router-aries
- addnode:
  - miner
  config: 'maxconnections=1000

    uacomment=recipient-aries

    coinstatsindex=1'
  global:
    chain: regtest
    rpcpassword: 6c4e6dd164c6507507230b7e7c247be3
  image:
    tag: '29.0'
  ln:
    lnd: true
  lnd:
    adminMacaroon: 
    extraContainers:
    - env:
      - name: METRICS
        value: 'lnd_block_height=parse("/v1/getinfo","block_height") lnd_balance_channels=parse("/v1/balance/channels","balance") '
      image: bitcoindevproject/lnd-exporter:0.2.0
      imagePullPolicy: IfNotPresent
      name: lnd-exporter
      ports:
      - containerPort: 9332
        name: prom-metrics
        protocol: TCP
      volumeMounts:
      - mountPath: /macaroon.hex
        name: config
        subPath: MACAROON_HEX
    image:
      tag: v0.19.0-beta
    macaroonRootKey: mEfJd3b7nfHsTrnIhn0A64I7jKPv13mbf12oe5Uu4kA=
    metricsExport: true
    prometheusMetricsPort: 9332
  name: recipient-aries
- addnode: []
  config: 'maxconnections=1000

    uacomment=miner

    coinstatsindex=1'
  global:
    chain: regtest
    rpcpassword: 2a3635bdef470af2b5bd345961c996ac
  image:
    tag: 29.0-util
  ln:
    lnd: true
  lnd:
    extraContainers:
    - env:
      - name: LN_VISUALIZER_API_URL
        value: http://127.0.0.1:5647
      image: bitcoindevproject/lnvisualizer:latest
      name: lnvisweb
      ports:
      - containerPort: 80
        name: web
        protocol: TCP
    - env:
      - name: LND_CERT_FILE
        value: /tls.cert
      - name: LND_MACAROON_FILE
        value: /root/.lnd/data/chain/bitcoin/regtest/admin.macaroon
      - name: LND_SOCKET
        value: localhost:10009
      - name: LNVIS_RESYNCTIMER
        value: '* * * * *'
      image: maxkotlan/ln-visualizer-api:v0.0.28
      name: lnvisapi
      ports:
      - containerPort: 5647
        name: api
        protocol: TCP
      volumeMounts:
      - mountPath: /root/.lnd/
        name: shared-volume
      - mountPath: /tls.cert
        name: config
        subPath: tls.cert
  name: miner
  startupProbe:
    exec:
      command:
      - /bin/sh
      - -c
      - bitcoin-cli createwallet miner && bitcoin-cli importdescriptors [{\"desc\":\"combo\(cScgYwrqmKxhViTrg4NBAQb6MvYHkj1XTFV9mLGJ5FdXeFL7WxAH\)#et8ffjxe\"\,\"timestamp\":0}]
    failureThreshold: 10
    periodSeconds: 30
    successThreshold: 1
    timeoutSeconds: 60
plugins:
  preDeploy:
    lnvisualizer:
      entrypoint: ../../plugins/lnvisualizer
      instance: miner
      name: lnd-ln
services:
- host: lnvisualizer.default
  path: /lnvisualizer/
  port: 80
  title: LN Visualizer Web UI
