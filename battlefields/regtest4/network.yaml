caddy:
  enabled: true
nodes:
- addnode:
  - miner
  config: 'maxconnections=1000

    uacomment=spender-aries

    coinstatsindex=1'
  global:
    chain: regtest
    rpcpassword: 57d4122d21e9ba1259847009a512ce7c
  image:
    tag: '29.0'
  ln:
    lnd: true
  lnd:
    adminMacaroon: 
    channels:
    - capacity: 200000000
      id:
        block: 500
        index: 1
      push_amt: 0
      target: router-aries-ln
    extraContainers:
    - env:
      - name: METRICS
        value: 'lnd_block_height=parse("/v1/getinfo","block_height") failed_payments=FAILED_PAYMENTS '
      image: bitcoindevproject/lnd-exporter-htlcs:0.2.0
      imagePullPolicy: IfNotPresent
      name: lnd-exporter
      ports:
      - containerPort: 9332
        name: prom-metrics
        protocol: TCP
      volumeMounts:
      - mountPath: /macaroon.hex
        name: config
        subPath: MACAROON_HEX
    image:
      tag: v0.19.0-beta
    macaroonRootKey: ahcD98ZZE2wiuTelCGWUuYmY7JpVJhNRgh5VPCV0ckw=
    metricsExport: true
    prometheusMetricsPort: 9332
  name: spender-aries
- addnode:
  - miner
  config: 'maxconnections=1000

    uacomment=router-aries

    coinstatsindex=1'
  global:
    chain: regtest
    rpcpassword: 56d921cef96e844aefdc935713fdce3c
  image:
    tag: '29.0'
  ln:
    lnd: true
  lnd:
    adminMacaroon: 
    channels:
    - capacity: 200000000
      id:
        block: 500
        index: 2
      push_amt: 0
      target: recipient-aries-ln
    extraContainers:
    - env:
      - name: METRICS
        value: 'lnd_block_height=parse("/v1/getinfo","block_height") pending_htlcs=PENDING_HTLCS '
      image: bitcoindevproject/lnd-exporter-htlcs:0.2.0
      imagePullPolicy: IfNotPresent
      name: lnd-exporter
      ports:
      - containerPort: 9332
        name: prom-metrics
        protocol: TCP
      volumeMounts:
      - mountPath: /macaroon.hex
        name: config
        subPath: MACAROON_HEX
    image:
      tag: v0.19.0-beta
    macaroonRootKey: fxtO3g9WHUWqMtB3rdQid7EioXEAdkmEFloJRIGYfCI=
    metricsExport: true
    prometheusMetricsPort: 9332
  name: router-aries
- addnode:
  - miner
  config: 'maxconnections=1000

    uacomment=recipient-aries

    coinstatsindex=1'
  global:
    chain: regtest
    rpcpassword: 32ce2efb4031de55bedb1d1cc8b48382
  image:
    tag: '29.0'
  ln:
    lnd: true
  lnd:
    adminMacaroon: 
    extraContainers:
    - env:
      - name: METRICS
        value: 'lnd_block_height=parse("/v1/getinfo","block_height") lnd_balance_channels=parse("/v1/balance/channels","balance") '
      image: bitcoindevproject/lnd-exporter-htlcs:0.2.0
      imagePullPolicy: IfNotPresent
      name: lnd-exporter
      ports:
      - containerPort: 9332
        name: prom-metrics
        protocol: TCP
      volumeMounts:
      - mountPath: /macaroon.hex
        name: config
        subPath: MACAROON_HEX
    image:
      tag: v0.19.0-beta
    macaroonRootKey: jIDtsJCRdeyo7RyRykaDk9bQOSNK9P89IOH0cjvugeE=
    metricsExport: true
    prometheusMetricsPort: 9332
  name: recipient-aries
- addnode: []
  config: 'maxconnections=1000

    uacomment=miner

    coinstatsindex=1'
  global:
    chain: regtest
    rpcpassword: c156d3fc57196766d55fb687437c9e1f
  image:
    tag: 29.0-util
  ln:
    lnd: true
  lnd:
    extraContainers:
    - env:
      - name: LN_VISUALIZER_API_URL
        value: http://127.0.0.1:5647
      image: bitcoindevproject/lnvisualizer:latest
      name: lnvisweb
      ports:
      - containerPort: 80
        name: web
        protocol: TCP
    - env:
      - name: LND_CERT_FILE
        value: /tls.cert
      - name: LND_MACAROON_FILE
        value: /root/.lnd/data/chain/bitcoin/regtest/admin.macaroon
      - name: LND_SOCKET
        value: localhost:10009
      - name: LNVIS_RESYNCTIMER
        value: '* * * * *'
      image: maxkotlan/ln-visualizer-api:v0.0.28
      name: lnvisapi
      ports:
      - containerPort: 5647
        name: api
        protocol: TCP
      volumeMounts:
      - mountPath: /root/.lnd/
        name: shared-volume
      - mountPath: /tls.cert
        name: config
        subPath: tls.cert
  name: miner
  startupProbe:
    exec:
      command:
      - /bin/sh
      - -c
      - bitcoin-cli createwallet miner && bitcoin-cli importdescriptors [{\"desc\":\"combo\(cMgS8GSH5eqRWwN1bEreRExg4HAuuAvFhExVZySRa2YvbWRfbHck\)#vhl7q2u0\"\,\"timestamp\":0}]
    failureThreshold: 10
    periodSeconds: 30
    successThreshold: 1
    timeoutSeconds: 60
plugins:
  preDeploy:
    lnvisualizer:
      entrypoint: ../../plugins/lnvisualizer
      instance: miner
      name: lnd-ln
services:
- host: lnvisualizer.default
  path: /lnvisualizer/
  port: 80
  title: LN Visualizer Web UI
