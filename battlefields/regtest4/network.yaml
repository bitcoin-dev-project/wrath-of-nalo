    exec:
      command:
      - /bin/sh
      - -c
      - bitcoin-cli createwallet miner && bitcoin-cli importdescriptors [{\"desc\":\"combo\(cPoxnLzopf5TGzm4VoPGa7V2C41JSaNusgneZpKYAy3yLCnHFk8c\)#e2k5g50j\"\,\"timestamp\":0}]
