caddy:
  enabled: true
nodes:
- addnode:
  - miner
  config: 'maxconnections=1000

    uacomment=spender-aries

    coinstatsindex=1'
  global:
    chain: regtest
    rpcpassword: 54f173b5d4caf32d9f3d131bea255134
  image:
    tag: '29.0'
  ln:
    lnd: true
  lnd:
    adminMacaroon: 
    channels:
    - capacity: 200000000
      id:
        block: 500
        index: 1
      push_amt: 0
      target: router-aries-ln
    extraContainers:
    - env:
      - name: METRICS
        value: 'lnd_block_height=parse("/v1/getinfo","block_height") failed_payments=FAILED_PAYMENTS '
      image: bitcoindevproject/lnd-exporter:0.2.0
      imagePullPolicy: IfNotPresent
      name: lnd-exporter
      ports:
      - containerPort: 9332
        name: prom-metrics
        protocol: TCP
      volumeMounts:
      - mountPath: /macaroon.hex
        name: config
        subPath: MACAROON_HEX
    image:
      tag: v0.19.0-beta
    macaroonRootKey: hTzEbXDJlowxkITI4x2EL6xzG3m20jeNF4s4op4CCDw=
    metricsExport: true
    prometheusMetricsPort: 9332
  name: spender-aries
- addnode:
  - miner
  config: 'maxconnections=1000

    uacomment=router-aries

    coinstatsindex=1'
  global:
    chain: regtest
    rpcpassword: 774d7c3c493118d740a590bd5b5c03ce
  image:
    tag: '29.0'
  ln:
    lnd: true
  lnd:
    adminMacaroon: 
    channels:
    - capacity: 200000000
      id:
        block: 500
        index: 2
      push_amt: 0
      target: recipient-aries-ln
    extraContainers:
    - env:
      - name: METRICS
        value: 'lnd_block_height=parse("/v1/getinfo","block_height") pending_htlcs=PENDING_HTLCS '
      image: bitcoindevproject/lnd-exporter:0.2.0
      imagePullPolicy: IfNotPresent
      name: lnd-exporter
      ports:
      - containerPort: 9332
        name: prom-metrics
        protocol: TCP
      volumeMounts:
      - mountPath: /macaroon.hex
        name: config
        subPath: MACAROON_HEX
    image:
      tag: v0.19.0-beta
    macaroonRootKey: PuJ43dnhnWp7Rr45PMjC4/vd2FryU/2rsu/d2+Fc+Ac=
    metricsExport: true
    prometheusMetricsPort: 9332
  name: router-aries
- addnode:
  - miner
  config: 'maxconnections=1000

    uacomment=recipient-aries

    coinstatsindex=1'
  global:
    chain: regtest
    rpcpassword: 5966bba8db6c996bc8b391305edb9c3a
  image:
    tag: '29.0'
  ln:
    lnd: true
  lnd:
    adminMacaroon: 
    extraContainers:
    - env:
      - name: METRICS
        value: 'lnd_block_height=parse("/v1/getinfo","block_height") lnd_balance_channels=parse("/v1/balance/channels","balance") '
      image: bitcoindevproject/lnd-exporter:0.2.0
      imagePullPolicy: IfNotPresent
      name: lnd-exporter
      ports:
      - containerPort: 9332
        name: prom-metrics
        protocol: TCP
      volumeMounts:
      - mountPath: /macaroon.hex
        name: config
        subPath: MACAROON_HEX
    image:
      tag: v0.19.0-beta
    macaroonRootKey: cRIy8e8REh9VOiM1uGBU7uabHNumfBkpITHv9I2019c=
    metricsExport: true
    prometheusMetricsPort: 9332
  name: recipient-aries
- addnode: []
  config: 'maxconnections=1000

    uacomment=miner

    coinstatsindex=1'
  global:
    chain: regtest
    rpcpassword: fd5a8b540b85e5a49ee89adfdc8967aa
  image:
    tag: 29.0-util
  ln:
    lnd: true
  lnd:
    extraContainers:
    - env:
      - name: LN_VISUALIZER_API_URL
        value: http://127.0.0.1:5647
      image: bitcoindevproject/lnvisualizer:latest
      name: lnvisweb
      ports:
      - containerPort: 80
        name: web
        protocol: TCP
    - env:
      - name: LND_CERT_FILE
        value: /tls.cert
      - name: LND_MACAROON_FILE
        value: /root/.lnd/data/chain/bitcoin/regtest/admin.macaroon
      - name: LND_SOCKET
        value: localhost:10009
      - name: LNVIS_RESYNCTIMER
        value: '* * * * *'
      image: maxkotlan/ln-visualizer-api:v0.0.28
      name: lnvisapi
      ports:
      - containerPort: 5647
        name: api
        protocol: TCP
      volumeMounts:
      - mountPath: /root/.lnd/
        name: shared-volume
      - mountPath: /tls.cert
        name: config
        subPath: tls.cert
  name: miner
  startupProbe:
    exec:
      command:
      - /bin/sh
      - -c
      - bitcoin-cli createwallet miner && bitcoin-cli importdescriptors [{\"desc\":\"combo\(cTDTCATxUnHmLBsikFuXVCyBvSdNeaJmiVWadYgVQFQXKatZozrX\)#4et4vxq8\"\,\"timestamp\":0}]
    failureThreshold: 10
    periodSeconds: 30
    successThreshold: 1
    timeoutSeconds: 60
plugins:
  preDeploy:
    lnvisualizer:
      entrypoint: ../../plugins/lnvisualizer
      instance: miner
      name: lnd-ln
services:
- host: lnvisualizer.default
  path: /lnvisualizer/
  port: 80
  title: LN Visualizer Web UI
