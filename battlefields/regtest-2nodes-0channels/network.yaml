      tag: v0.19.0-beta
    macaroonRootKey: +ap8a/QoJIcp3M5dnMfcIp5H093qLmj7iZeMiXoIVT0=
  name: tank-0000
- addnode:
  - miner
  config: 'maxconnections=1000

    uacomment=tank-0001

    coinstatsindex=1'
  global:
    chain: regtest
    rpcpassword: 2effdd829a9e28bf2b6f976c92fcf16e
  image:
    tag: '29.0'
  ln:
    lnd: true
  lnd:
    adminMacaroon: 
    image:
      tag: v0.19.0-beta
    macaroonRootKey: NvjbLEln6KIMVZxj/23mnU1FjETHjolCnaXvW8C/Nwg=
  name: tank-0001
- addnode: []
  config: 'maxconnections=1000

    uacomment=miner

    coinstatsindex=1'
  global:
    chain: regtest
    rpcpassword: cf39374df41b30d0a624bf9db054a330
  image:
    tag: 29.0-util
  ln:
    lnd: true
  lnd:
    extraContainers:
    - env:
      - name: LN_VISUALIZER_API_URL
        value: http://127.0.0.1:5647
      image: bitcoindevproject/lnvisualizer:latest
      name: lnvisweb
      ports:
      - containerPort: 80
        name: web
        protocol: TCP
    - env:
      - name: LND_CERT_FILE
        value: /tls.cert
      - name: LND_MACAROON_FILE
        value: /root/.lnd/data/chain/bitcoin/regtest/admin.macaroon
      - name: LND_SOCKET
        value: localhost:10009
      - name: LNVIS_RESYNCTIMER
        value: '* * * * *'
      image: maxkotlan/ln-visualizer-api:v0.0.28
      name: lnvisapi
      ports:
      - containerPort: 5647
        name: api
        protocol: TCP
      volumeMounts:
      - mountPath: /root/.lnd/
        name: shared-volume
      - mountPath: /tls.cert
        name: config
        subPath: tls.cert
  name: miner
  startupProbe:
    exec:
      command:
      - /bin/sh
      - -c
      - bitcoin-cli createwallet miner && bitcoin-cli importdescriptors [{\"desc\":\"combo\(cRKYDwrkkJLRynu9Ci1n1BprThQPE7cEPetdpAeSuYsZyvrd26wD\)#qrdmem36\"\,\"timestamp\":0}]
    failureThreshold: 10
    periodSeconds: 30
    successThreshold: 1
    timeoutSeconds: 60
plugins:
  preDeploy:
    lnvisualizer:
      entrypoint: ../../plugins/lnvisualizer
      instance: miner
      name: lnd-ln
services:
- host: lnvisualizer.default
  path: /lnvisualizer/
  port: 80
  title: LN Visualizer Web UI
